name: Build

on:
  push:
    branches: [main]
  release:
    types: [created]

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build .app
        run: bash packaging/build_mac.sh

      - name: Create DMG
        run: |
          hdiutil create \
            -volname "TypeForge" \
            -srcfolder dist/TypeForge.app \
            -ov -format UDZO \
            dist/TypeForge-mac.dmg

      - uses: actions/upload-artifact@v4
        with:
          name: TypeForge-mac
          path: dist/TypeForge-mac.dmg

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build exe
        run: packaging\build_windows.bat

      - uses: actions/upload-artifact@v4
        with:
          name: TypeForge-windows
          path: dist/TypeForge.exe

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxcb-xinerama0 libxcb-cursor0 libxcb-icccm4 libxcb-image0 \
            libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 libxcb-shape0 \
            libxcb-xfixes0 libxkbcommon-x11-0 libglib2.0-0 libdbus-1-3 \
            libgl1 libegl1 libfontconfig1 libfreetype6 \
            libxrender1 libx11-xcb1 fuse libfuse2

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build binary
        run: bash packaging/build_linux.sh

      - name: Download appimagetool
        run: |
          wget -q \
            https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage \
            -O appimagetool
          chmod +x appimagetool

      - name: Create AppImage
        run: |
          mkdir -p TypeForge.AppDir/usr/bin

          # Copy binary and its dependencies
          cp -r dist/TypeForge/* TypeForge.AppDir/usr/bin/

          # AppRun launcher
          cat > TypeForge.AppDir/AppRun << 'EOF'
          #!/bin/bash
          SELF=$(readlink -f "$0")
          HERE=${SELF%/*}
          exec "$HERE/usr/bin/TypeForge" "$@"
          EOF
          chmod +x TypeForge.AppDir/AppRun

          # Desktop entry
          cat > TypeForge.AppDir/typeforge.desktop << 'EOF'
          [Desktop Entry]
          Name=TypeForge
          Exec=TypeForge
          Icon=typeforge
          Type=Application
          Categories=Utility;Education;
          EOF

          # Placeholder icon (1x1 png satisfies appimagetool requirement)
          python3 -c "
          import struct, zlib
          def png1x1(r,g,b):
              def chunk(t,d):
                  c=zlib.crc32(t+d)&0xffffffff
                  return struct.pack('>I',len(d))+t+d+struct.pack('>I',c)
              ihdr=struct.pack('>IIBBBBB',256,256,8,2,0,0,0)
              row=bytes([0]+[r,g,b]*256)
              idat=zlib.compress(row*256)
              return b'\x89PNG\r\n\x1a\n'+chunk(b'IHDR',ihdr)+chunk(b'IDAT',idat)+chunk(b'IEND',b'')
          open('TypeForge.AppDir/typeforge.png','wb').write(png1x1(13,13,30))
          "

          ARCH=x86_64 ./appimagetool --appimage-extract-and-run \
            TypeForge.AppDir \
            dist/TypeForge-linux.AppImage

      - uses: actions/upload-artifact@v4
        with:
          name: TypeForge-linux
          path: dist/TypeForge-linux.AppImage
